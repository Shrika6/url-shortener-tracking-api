services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url-shortener-app
    env_file:
      - .env
    environment:
      DB_URL: ${DB_URL}
      REDIS_URL: ${REDIS_URL}
      BASE_URL: ${BASE_URL}
      PORT: ${PORT:-8080}
      CACHE_TTL: ${CACHE_TTL:-24h}
      CODE_LENGTH: ${CODE_LENGTH:-6}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-100}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-1m}
      CLICK_FLUSH_INTERVAL: ${CLICK_FLUSH_INTERVAL:-5s}
      CLICK_FLUSH_BATCH_SIZE: ${CLICK_FLUSH_BATCH_SIZE:-500}
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-10s}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-10s}
      HTTP_IDLE_TIMEOUT: ${HTTP_IDLE_TIMEOUT:-60s}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10s}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: url-shortener-postgres
    environment:
      POSTGRES_DB: url_shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortener"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
